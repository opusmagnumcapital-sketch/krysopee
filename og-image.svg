<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0A0A08"/>

  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(184,150,14,0.05)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(184,150,14,0.06)"/>
      <stop offset="100%" stop-color="rgba(10,10,8,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Cercles concentriques — centrés sur 315, rayon réduit pour ne pas déborder -->
  <g transform="translate(600,315)">
    <circle r="255" stroke="#B8960E" stroke-width="0.5" fill="none" opacity="0.10"/>
    <circle r="200" stroke="#B8960E" stroke-width="0.4" fill="none" opacity="0.09"/>
    <circle r="145" stroke="#B8960E" stroke-width="0.4" fill="none" opacity="0.07"/>

    <!-- Croix alchimique légère -->
    <line x1="0" y1="-255" x2="0" y2="255" stroke="#B8960E" stroke-width="0.4" opacity="0.09"/>
    <line x1="-255" y1="0" x2="255" y2="0" stroke="#B8960E" stroke-width="0.4" opacity="0.09"/>

    <!-- Octogone -->
    <polygon points="0,-180 127,-127 180,0 127,127 0,180 -127,127 -180,0 -127,-127"
      stroke="#B8960E" stroke-width="0.4" fill="none" opacity="0.08"/>

    <!-- Quatre points cardinaux sur le cercle externe -->
    <circle cx="0"    cy="-200" r="3" fill="#B8960E" opacity="0.35"/>
    <circle cx="200"  cy="0"    r="3" fill="#B8960E" opacity="0.35"/>
    <circle cx="0"    cy="200"  r="3" fill="#B8960E" opacity="0.35"/>
    <circle cx="-200" cy="0"    r="3" fill="#B8960E" opacity="0.35"/>
  </g>

  <!-- Symbole ☉ positionné SOUS la devise, bien séparé du texte — y=490 -->
  <circle cx="600" cy="488" r="14" stroke="#B8960E" stroke-width="0.9" fill="none" opacity="0.55"/>
  <circle cx="600" cy="488" r="4.5" fill="#B8960E" opacity="0.7"/>

  <!-- Lignes latérales décoratives -->
  <line x1="55"  y1="315" x2="195" y2="315" stroke="#B8960E" stroke-width="0.5" opacity="0.22"/>
  <line x1="1005" y1="315" x2="1145" y2="315" stroke="#B8960E" stroke-width="0.5" opacity="0.22"/>
  <circle cx="195"  cy="315" r="2.5" fill="#B8960E" opacity="0.28"/>
  <circle cx="1005" cy="315" r="2.5" fill="#B8960E" opacity="0.28"/>

  <!-- NOM — bien centré, y=252 -->
  <text x="600" y="252" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="72"
    font-weight="300"
    letter-spacing="14"
    fill="#F2EFE4">KRYSOPÉE</text>

  <!-- Séparateur doré — y=282, bien en dessous du nom -->
  <line x1="460" y1="282" x2="740" y2="282" stroke="#B8960E" stroke-width="0.8" opacity="0.45"/>

  <!-- Tagline — y=320, espace confortable sous le séparateur -->
  <text x="600" y="320" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="21"
    font-weight="300"
    font-style="italic"
    letter-spacing="3"
    fill="#8A8A7A">L'Art de Transmuterl'Or</text>

  <!-- Devise — y=368, bien séparée de la tagline -->
  <text x="600" y="368" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="12"
    letter-spacing="9"
    fill="rgba(184,150,14,0.42)">☉  ·  NEMINI TENERI  ·  ☿</text>

  <!-- URL en bas — y=572 -->
  <text x="600" y="572" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="14"
    letter-spacing="5"
    fill="rgba(184,150,14,0.28)">krysopee.capital</text>

  <!-- Bordure fine -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#B8960E" stroke-width="0.5" opacity="0.10"/>
</svg>
